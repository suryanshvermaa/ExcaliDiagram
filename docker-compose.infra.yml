services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: excelidraw-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: icons-db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible local dev) ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: excelidraw-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket initialiser (runs once, then exits) ─────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: excelidraw-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb local/icons --ignore-existing &&
        mc anonymous set download local/icons &&
        echo '✅  MinIO bucket ready'
      "
    restart: "no"

volumes:
  mongo_data:
  minio_data:
